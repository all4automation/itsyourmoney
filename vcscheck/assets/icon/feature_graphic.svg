<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <!-- Background -->
  <rect width="1024" height="500" fill="#435E91"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="1024" y2="100" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="1024" y2="200" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="1024" y2="300" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="1024" y2="400" stroke="white" stroke-width="0.5" opacity="0.08"/>

  <!-- Chart lines (right side, decorative) -->
  <!-- Conservative (orange) -->
  <path d="M 560 420 Q 720 400 940 290"
    fill="none" stroke="#F5A623" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Moderate (white) -->
  <path d="M 560 420 Q 720 340 940 180"
    fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Aggressive (green) -->
  <path d="M 560 420 Q 720 270 940 80"
    fill="none" stroke="#27AE60" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Endpoint dots -->
  <circle cx="940" cy="290" r="7" fill="#F5A623"/>
  <circle cx="940" cy="180" r="7" fill="white"/>
  <circle cx="940" cy="80"  r="7" fill="#27AE60"/>

  <!-- Start dot -->
  <circle cx="560" cy="420" r="6" fill="white" opacity="0.4"/>

  <!-- App icon (left, scaled down) -->
  <rect x="60" y="160" width="100" height="100" rx="22" fill="white" opacity="0.15"/>
  <g transform="translate(60 160) scale(4.17)">
    <path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6.01 4 4 6.36-6.37L22 12V6h-6z"
      fill="white"/>
  </g>

  <!-- App name -->
  <text x="180" y="210"
    font-family="sans-serif" font-size="52" font-weight="700"
    fill="white" letter-spacing="-1">It's Your Money</text>

  <!-- Tagline -->
  <text x="181" y="258"
    font-family="sans-serif" font-size="22" font-weight="400"
    fill="white" opacity="0.75" letter-spacing="0.5">Your wealth. Three scenarios. Two minutes.</text>

  <!-- Scenario labels (right side) -->
  <text x="952" y="85"  font-family="sans-serif" font-size="14" fill="#27AE60" font-weight="600">Aggressive</text>
  <text x="952" y="185" font-family="sans-serif" font-size="14" fill="white"   font-weight="600">Moderate</text>
  <text x="952" y="295" font-family="sans-serif" font-size="14" fill="#F5A623" font-weight="600">Conservative</text>
</svg>
